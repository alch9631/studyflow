name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci.db"
      # CI verifies build/types/tests in single-user dev mode (no Google OAuth in
      # CI): getCurrentUserId() falls back to the seeded dev user instead of
      # calling Auth.js's auth(), which needs a real request scope.
      ALLOW_DEV_USER: "1"
      AUTH_SECRET: "ci-not-a-real-secret-aaaaaaaaaaaaaaaaaaaaaaaa"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
