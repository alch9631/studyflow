name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Local SQLite DB for the CI run. NODE_ENV is not "production" here, so
      # getCurrentUserId() falls back to the seeded dev user automatically — no
      # ALLOW_DEV_USER flag or AUTH_SECRET needed (Auth.js isn't exercised in CI).
      DATABASE_URL: "file:./ci.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run ci
