name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run test:engine
      - run: npm run test:service
      - run: npm run test:dates
      - run: npm run test:ics
      - run: npm run test:stats
      - run: npm run test:cache
      - run: npm run build
